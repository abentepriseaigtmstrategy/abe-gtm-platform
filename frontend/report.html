<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strategy Report · ABE AI Revenue Infrastructure</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- html2canvas and jsPDF removed in Phase 21F — PDF rendering is backend-only via Gotenberg -->
  <script src="auth-guard.js"></script>
  <script src="ga4-tag.js"></script>
  <style>
    :root {
      --bg: #0B0F1A;
      --bg-alt: #0D1120;
      --card: #121827;
      --border: #1F2937;
      --accent: #a855f7;
      --accent2: #7c3aed;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --blue: #3b82f6;
      --text: #E5E7EB;
      --muted: #6B7280;
      --faint: #374151;
      --white: #ffffff;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      background-color: #0c0d11;
      color: var(--text);
      font-size: 11.5pt;
      min-height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
      line-height: 1.65;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image: linear-gradient(rgba(168, 85, 247, .02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(168, 85, 247, .02) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* ── NAV ── */
    #topnav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(11, 15, 26, .95);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(31, 41, 55, .6);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 58px;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .nav-mark {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: white;
    }

    .nbname {
      font-size: 11px;
      font-weight: 800;
      color: white;
    }

    .nbsub {
      font-size: 8px;
      color: var(--muted);
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 18px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      transition: all .15s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
    }

    .btn-primary:hover {
      opacity: .9;
      transform: translateY(-1px);
    }

    .btn-outline {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-outline:hover {
      border-color: var(--accent);
      color: white;
    }

    .btn:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none !important;
    }

    /* ── LAYOUT ── */
    .wrap {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 32px;
    }

    .ph {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 36px;
      gap: 24px;
    }

    .ph-left .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .25em;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 6px;
    }

    .ph-left .title {
      font-size: 30px;
      font-weight: 900;
      color: white;
      letter-spacing: -.8px;
    }

    .ph-left .meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
    }

    .ph-actions {
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    /* ── LOADING / ERROR ── */
    #loading-state {
      text-align: center;
      padding: 100px 32px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(168, 85, 247, .2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #error-state {
      display: none;
      text-align: center;
      padding: 100px 32px;
    }

    .error-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .abe-skeleton {
      background: linear-gradient(90deg, rgba(31, 41, 55, .6) 0%, rgba(55, 65, 81, .4) 50%, rgba(31, 41, 55, .6) 100%);
      background-size: 200% 100%;
      animation: abe-shimmer 1.5s infinite;
      border-radius: 8px;
    }

    @keyframes abe-shimmer {
      0% {
        background-position: 200% 0;
      }

      100% {
        background-position: -200% 0;
      }
    }

    .abe-skeleton-line {
      height: 10px;
      border-radius: 5px;
      margin-bottom: 8px;
    }

    .abe-skeleton-card {
      background: rgba(18, 24, 39, .7);
      border: 1px solid rgba(31, 41, 55, .5);
      border-radius: 20px;
      padding: 20px;
    }

    /* ── KPI STRIP ── */
    .score-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 32px;
    }

    .sc {
      background: rgba(18, 24, 39, .7);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 22px;
      transition: border-color .2s;
      position: relative;
      overflow: hidden;
    }

    .sc::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      opacity: .6;
      border-radius: 0 0 14px 14px;
    }

    .sc:hover {
      border-color: var(--accent);
    }

    .sv {
      font-size: 26px;
      font-weight: 900;
      font-family: 'Space Mono', monospace;
      color: white;
      letter-spacing: -1px;
    }

    .sl {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .18em;
      color: var(--muted);
      font-weight: 700;
      margin-top: 4px;
    }

    .sv.green {
      color: var(--green);
    }

    .sv.amber {
      color: var(--amber);
    }

    .sv.purple {
      color: var(--accent);
    }

    .sv.red {
      color: var(--red);
    }

    /* ── COVER POSITIONING STRIP ── */
    .cover-strip {
      background: linear-gradient(135deg, rgba(168, 85, 247, .06), rgba(124, 58, 237, .04));
      border: 1px solid rgba(168, 85, 247, .15);
      border-left: 3px solid var(--accent);
      border-radius: 8px;
      padding: 12px 18px;
      margin-bottom: 24px;
    }

    .cover-strip .cs-label {
      font-size: 8px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .2em;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .cover-strip .cs-text {
      font-size: 12px;
      color: var(--text);
      line-height: 1.6;
    }

    /* ── EXECUTIVE SUMMARY ── */
    .exec-card {
      background: rgba(168, 85, 247, .04);
      border: 1px solid rgba(168, 85, 247, .18);
      border-radius: 16px;
      padding: 24px 28px;
      margin-bottom: 24px;
    }

    .exec-card p {
      font-size: 13px;
      line-height: 1.85;
      color: var(--text);
    }

    /* ── SECTION ── */
    .section {
      background: rgba(18, 24, 39, .6);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 32px;
      margin-bottom: 20px;
      max-height: none;
      overflow: visible;
    }

    .sec-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
    }

    .sec-num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      font-size: 10px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .sec-title {
      font-size: 15px;
      font-weight: 800;
      color: white;
    }

    .sec-context {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px dashed var(--border);
    }

    /* ── ANALYST CALLOUT ── */
    .analyst-callout {
      background: rgba(168, 85, 247, .04);
      border: 1px solid rgba(168, 85, 247, .2);
      border-left: 4px solid var(--accent);
      border-radius: 8px;
      padding: 12px 16px;
      margin: 14px 0;
      font-size: 11.5px;
      line-height: 1.7;
    }

    .analyst-callout strong {
      color: var(--accent);
    }

    .analyst-callout.amber {
      background: rgba(245, 158, 11, .04);
      border-color: rgba(245, 158, 11, .2);
      border-left-color: var(--amber);
    }

    .analyst-callout.amber strong {
      color: var(--amber);
    }

    .analyst-callout.green {
      background: rgba(34, 197, 94, .04);
      border-color: rgba(34, 197, 94, .2);
      border-left-color: var(--green);
    }

    .analyst-callout.green strong {
      color: var(--green);
    }

    .analyst-callout.red {
      background: rgba(239, 68, 68, .04);
      border-color: rgba(239, 68, 68, .2);
      border-left-color: var(--red);
    }

    .analyst-callout.red strong {
      color: var(--red);
    }

    /* ── FIELDS ── */
    .field {
      margin-bottom: 14px;
    }

    .fl {
      font-size: 8px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .18em;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .fv {
      font-size: 12px;
      color: #D1D5DB;
      line-height: 1.7;
      background: rgba(0, 0, 0, .3);
      border-radius: 8px;
      padding: 12px 14px;
      border-left: 3px solid var(--accent);
    }

    .fv.green {
      border-color: var(--green);
    }

    .fv.amber {
      border-color: var(--amber);
    }

    .fv.red {
      border-color: var(--red);
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 5px;
    }

    .tag {
      font-size: 10px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
      background: rgba(168, 85, 247, .1);
      color: var(--accent);
      border: 1px solid rgba(168, 85, 247, .2);
    }

    .tag.green {
      background: rgba(34, 197, 94, .1);
      color: var(--green);
      border-color: rgba(34, 197, 94, .2);
    }

    .tag.blue {
      background: rgba(59, 130, 246, .1);
      color: #60a5fa;
      border-color: rgba(59, 130, 246, .2);
    }

    .tag.amber {
      background: rgba(245, 158, 11, .1);
      color: var(--amber);
      border-color: rgba(245, 158, 11, .2);
    }

    .tag.red {
      background: rgba(239, 68, 68, .1);
      color: var(--red);
      border-color: rgba(239, 68, 68, .2);
    }

    /* ── GRID HELPERS ── */
    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 14px;
    }

    .grid3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    .metric-box {
      background: rgba(0, 0, 0, .3);
      border-radius: 10px;
      padding: 16px 18px;
      border: 1px solid var(--border);
    }

    .mv {
      font-size: 22px;
      font-weight: 900;
      font-family: 'Space Mono', monospace;
      color: white;
    }

    .ml {
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--muted);
      margin-top: 3px;
    }

    /* ── SWOT ── */
    .swot-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .swot-cell {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      background: rgba(0, 0, 0, .25);
    }

    .swot-label {
      font-size: 8px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .18em;
      margin-bottom: 8px;
    }

    .swot-s {
      border-top: 3px solid var(--green);
    }

    .swot-s .swot-label {
      color: var(--green);
    }

    .swot-w {
      border-top: 3px solid var(--red);
    }

    .swot-w .swot-label {
      color: var(--red);
    }

    .swot-o {
      border-top: 3px solid var(--blue);
    }

    .swot-o .swot-label {
      color: var(--blue);
    }

    .swot-t {
      border-top: 3px solid var(--amber);
    }

    .swot-t .swot-label {
      color: var(--amber);
    }

    .swot-cell ul {
      padding-left: 14px;
    }

    .swot-cell li {
      font-size: 11px;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.55;
    }

    /* ── WATERFALL ── */
    .waterfall {
      margin: 12px 0 16px;
    }

    .wf-row {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      gap: 10px;
    }

    .wf-label {
      width: 80px;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      text-align: right;
    }

    .wf-val {
      width: 110px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      text-align: right;
      color: white;
      flex-shrink: 0;
    }

    .wf-bar-wrap {
      flex: 1;
      background: rgba(255, 255, 255, .08);
      border-radius: 6px;
      height: 18px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, .06);
      position: relative;
    }

    .wf-bar {
      height: 100%;
      border-radius: 6px;
      transition: width .6s ease;
      min-width: 4px;
    }

    .wf-blue {
      background: linear-gradient(90deg, #1d4ed8, #3b82f6, #60a5fa);
      box-shadow: 0 0 8px rgba(59, 130, 246, .4);
    }

    .wf-purple {
      background: linear-gradient(90deg, var(--accent2), var(--accent), #c084fc);
      box-shadow: 0 0 8px rgba(168, 85, 247, .4);
    }

    .wf-amber {
      background: linear-gradient(90deg, #b45309, #d97706, var(--amber));
      box-shadow: 0 0 8px rgba(245, 158, 11, .3);
    }

    .wf-green {
      background: linear-gradient(90deg, #15803d, #16a34a, var(--green));
      box-shadow: 0 0 8px rgba(34, 197, 94, .3);
    }

    .wf-label {
      width: 90px;
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      text-align: right;
      flex-shrink: 0;
    }

    .wf-val {
      width: 120px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      text-align: right;
      color: white;
      flex-shrink: 0;
      padding-right: 4px;
    }

    /* ── PAIN TABLE ── */
    .pain-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      margin-bottom: 14px;
    }

    .pain-table th {
      text-align: left;
      color: var(--muted);
      font-weight: 700;
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: .12em;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
    }

    .pain-table td {
      padding: 10px;
      border-bottom: 1px solid rgba(31, 41, 55, .5);
      vertical-align: top;
      line-height: 1.6;
    }

    .pain-table tr:last-child td {
      border-bottom: none;
    }

    /* ── EMAIL CARDS ── */
    .email-card {
      background: rgba(0, 0, 0, .3);
      border: 1px solid rgba(168, 85, 247, .2);
      border-radius: 10px;
      padding: 18px 20px;
      margin-bottom: 14px;
    }

    .ea {
      font-size: 9px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .15em;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .es {
      font-size: 12px;
      font-weight: 800;
      color: white;
      margin-bottom: 8px;
    }

    .ebo {
      font-size: 11px;
      color: #D1D5DB;
      line-height: 1.7;
      white-space: pre-line;
      word-break: break-word;
      overflow-wrap: anywhere;
      min-width: 0;
      width: 100%;
      display: block;
    }

    .ec {
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(168, 85, 247, .15);
    }

    /* ── STEP 7 DECISION ENGINE ── */
    .decision-go {
      color: var(--green);
    }

    .decision-watch {
      color: var(--amber);
    }

    .decision-nogo {
      color: var(--red);
    }

    .decision-badge {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: rgba(0, 0, 0, .3);
      border-radius: 12px;
      padding: 20px 24px;
      border: 1px solid var(--border);
      margin-bottom: 14px;
      width: 100%;
    }

    .decision-badge .verdict {
      font-size: 36px;
      font-weight: 900;
      font-family: 'Space Mono', monospace;
      min-width: 80px;
    }

    .decision-badge .reason {
      font-size: 12px;
      color: var(--text);
      line-height: 1.65;
    }

    .confidence-bar-wrap {
      background: rgba(0, 0, 0, .3);
      border-radius: 8px;
      height: 10px;
      margin-top: 6px;
      overflow: hidden;
    }

    .confidence-bar {
      height: 100%;
      border-radius: 8px;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      transition: width .8s ease;
    }

    /* ── RISK LIST ── */
    .risk-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .risk-list li {
      padding: 12px 14px;
      border-left: 3px solid var(--red);
      background: rgba(239, 68, 68, .04);
      border-radius: 0 8px 8px 0;
      margin-bottom: 10px;
      font-size: 12px;
      line-height: 1.65;
    }

    .risk-list li strong {
      color: var(--red);
      display: block;
      margin-bottom: 2px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    /* ── MOBILE NAV ── */
    #mobile-menu-btn {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 8px;
      background: rgba(255, 255, 255, .05);
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 8px;
    }

    #mobile-menu-btn span {
      width: 20px;
      height: 2px;
      background: #9ca3af;
      border-radius: 2px;
      transition: all .3s;
      display: block;
    }

    #mobile-menu-btn.open span:nth-child(1) {
      transform: translateY(7px) rotate(45deg);
    }

    #mobile-menu-btn.open span:nth-child(2) {
      opacity: 0;
    }

    #mobile-menu-btn.open span:nth-child(3) {
      transform: translateY(-7px) rotate(-45deg);
    }

    #mobile-nav-drawer {
      display: none;
      position: fixed;
      top: 58px;
      left: 0;
      right: 0;
      background: rgba(11, 15, 26, .98);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(31, 41, 55, .8);
      padding: 16px 20px;
      z-index: 99;
      flex-direction: column;
      gap: 4px;
    }

    #mobile-nav-drawer.open {
      display: flex;
    }

    #mobile-nav-drawer a,
    #mobile-nav-drawer button {
      display: block;
      width: 100%;
      padding: 12px 16px;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #9ca3af;
      text-decoration: none;
      border-radius: 10px;
      border: none;
      background: transparent;
      cursor: pointer;
      text-align: left;
      transition: all .15s;
    }

    #mobile-nav-drawer a:hover,
    #mobile-nav-drawer button:hover {
      background: rgba(168, 85, 247, .1);
      color: white;
    }

    #mobile-nav-drawer a.active-mobile {

  <script>
    // ── Helpers ───────────────────────────────────────────────────────
    function esc(str) {
      if (str === null || str === undefined) return '';
      if (typeof str !== 'string') {
        if (Array.isArray(str)) return str.join(', ');
        if (typeof str === 'object') return Object.entries(str).map(([k, v]) => `${k}: ${v}`).join(' | ');
        return String(str);
      }
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function safe(val) {
      if (!val && val !== 0) return '';
      if (Array.isArray(val)) return val.join(', ');
      if (typeof val === 'object') return Object.entries(val).map(([k, v]) => `${k}: ${Array.isArray(v) ? v.join(', ') : v}`).join('\n');
      return String(val);
    }

    function field(label, val, cls = '') {
      const v = safe(val); if (!v) return '';
      return `<div class="field"><div class="fl">${esc(label)}</div><div class="fv ${cls}">${esc(v).replace(/\n/g, '<br>')}</div></div>`;
    }
    function tagRow(label, arr, cls = '') {
      const a = Array.isArray(arr) ? arr : (arr ? [String(arr)] : []); if (!a.length) return '';
      return `<div class="field"><div class="fl">${esc(label)}</div><div class="tags">${a.slice(0, 20).map(t => `<span class="tag ${cls}">${esc(String(t))}</span>`).join('')}</div></div>`;
    }
    function emailCard(em, label) {
      if (!em || typeof em !== 'object') return '';
      if (!em.subject && !em.body) return '';
      return `<div class="email-card">
    <div class="ea">${esc(em.angle || label)}</div>
    ${em.subject ? `<div class="es">Subject: ${esc(em.subject)}</div>` : ''}
    ${em.body ? `<div class="ebo">${esc(em.body)}</div>` : ''}
    ${em.cta ? `<div class="ec">→ ${esc(em.cta)}</div>` : ''}
  </div>`;
    }
    // ── Section key → insight key map ─────────────────────────────────
    const SECTION_INSIGHT_MAP = {
      '01': 'market',
      '02': 'tam',
      '03': 'icp',
      '04': 'sourcing',
      '05': 'keywords',
      '06': 'messaging',
      '07': 'decision',
    };

    // ── Educational Insights data ──────────────────────────────────────
    const EDUCATIONAL_INSIGHTS = {
      market: {
        term: 'SWOT Analysis',
        definition: 'A structured framework evaluating four dimensions: Strengths (internal assets that create competitive advantage), Weaknesses (internal gaps that limit performance), Opportunities (external forces to exploit), and Threats (external risks to mitigate). Used at the top of every GTM cycle to anchor positioning decisions.',
        subPoints: [
          'Strengths → Lead messaging. Weaknesses → Pre-empt objections.',
          'Opportunities → Frame urgency in outreach. Threats → Build risk narratives.',
          'Revisit SWOT after each major deal win or loss for drift calibration.',
        ],
        proTip: "The most actionable SWOT maps each quadrant to a specific GTM motion. Don't produce a SWOT and then ignore it — run it through your messaging layer.",
      },
      tam: {
        term: 'TAM · SAM · SOM',
        definition: 'Three nested market-sizing layers every enterprise revenue team must quantify before committing pipeline spend.',
        subPoints: [
          'TAM (Total Addressable Market) — The global revenue opportunity if you held 100% market share.',
          'SAM (Serviceable Addressable Market) — The slice of TAM reachable by your current product and geographic scope.',
          'SOM (Serviceable Obtainable Market) — The realistic share of SAM you can close in the next 12–24 months based on win rate, capacity, and competition.',
        ],
        proTip: "Investors and CROs care about SOM, not TAM. Always anchor your pipeline forecast on SOM × CAGR, not the headline TAM number.",
      },
      icp: {
        term: 'ICP — Ideal Customer Profile',
        definition: 'A data-driven description of the company (firmographics) and buyer (psychographics + technographics) most likely to purchase, expand, and advocate for your product. Distinct from a Buyer Persona, which describes an individual; an ICP defines the entire account.',
        subPoints: [
          'Firmographic filters: revenue band, headcount, industry vertical, geography, tech stack.',
          'Psychographic signals: risk tolerance, innovation appetite, regulatory burden.',
          'Behavioural triggers: recent funding, leadership change, compliance event, merger/acquisition.',
        ],
        proTip: "Your ICP should disqualify as aggressively as it qualifies. A tight ICP improves SDR conversion, shortens sales cycles, and lifts net revenue retention.",
      },
      sourcing: {
        term: 'Account Sourcing Methodology',
        definition: 'The structured process of building a prospect universe from your ICP filters. Combines technographic databases (Apollo, Lusha, ZoomInfo), intent data platforms (Bombora, G2), and social signals (LinkedIn Sales Navigator) to produce a ranked, enriched target list.',
        subPoints: [
          'Tier 1 (Dream 100): Manually curated high-fit accounts — maximum SDR effort.',
          'Tier 2 (Scaled Outbound): ICP-matched but lower intent — sequence-driven automation.',
          'Tier 3 (Programmatic): Broad awareness plays — content and paid channels.',
        ],
        proTip: "Enrich every sourced account with at least two contact-level signals (a job-change alert and a content-engagement event) before your first outreach touch.",
      },
      keywords: {
        term: 'Intent Signal Taxonomy',
        definition: "A structured map of the language a buyer uses at each stage of their purchase journey — from problem-aware (early funnel) through solution-aware (late funnel) to vendor-selection (bottom-of-funnel). Drives SEO, paid, and ABM targeting.",
        subPoints: [
          "Early funnel: problem-definition language — 'how to reduce X', 'why is Y slow'.",
          "Mid funnel: category language — 'best tools for X', 'X software comparison'.",
          "Late funnel: vendor language — branded terms, G2 review searches, pricing pages.",
        ],
        proTip: "Map your outreach email subject lines to late-funnel intent keywords. Subject lines that mirror the buyer's own language achieve 2–3× higher open rates than generic approaches.",
      },
      messaging: {
        term: 'Outreach Sequencing Principles',
        definition: 'A multi-touch cadence that progresses a cold prospect from unaware to engaged through alternating channels (email, LinkedIn, phone) and escalating value-adds (insight → proof → urgency).',
        subPoints: [
          'Touch 1 (Day 1): Personalised insight — reference a specific trigger event.',
          'Touch 2 (Day 3): Hard ROI metric — quantify the cost of inaction.',
          'Touch 3 (Day 7): Social proof — a relevant case study or proof data point.',
          'Touch 4 (Day 14): Permission-based break-up — low-friction re-engagement ask.',
        ],
        proTip: "The biggest sequencing mistake is making every touch a pitch. Alternate between giving value and asking for a micro-commitment — the ratio should be 3:1 in favour of value.",
      },
      decision: {
        term: 'Go / Watch / No-Go Framework',
        definition: 'A three-tier qualification gate used at the end of account intelligence to align sales and marketing on pipeline entry decisions — before SDR time is committed.',
        subPoints: [
          'GO (score ≥ 75): Strong signal fidelity and active buying trigger. Enter immediately.',
          'WATCH (score 50–74): Signals present but incomplete. Monitor for a catalyst event.',
          'NO-GO (score < 50): Insufficient fit. Park for 90-day re-evaluation or trigger-based re-entry.',
        ],
        proTip: "A 'No-Go' is not a rejection — it's a time-allocation decision. Build a 90-day nurture sequence for No-Go accounts so they re-enter your pipeline automatically when their situation changes.",
      },
    };

    // ── Build filler HTML from an insight key ─────────────────────────
    function buildFillerHtml(insightKey) {
      const ins = EDUCATIONAL_INSIGHTS[insightKey];
      if (!ins) return '';
      const pts = (ins.subPoints || []).map(p => `<li>${esc(p)}</li>`).join('');
      return `<div class="edu-filler">
    <div class="edu-filler__badge">📖 Glossary</div>
    <div class="edu-filler__term">${esc(ins.term)}</div>
    <div class="edu-filler__definition">${esc(ins.definition)}</div>
    ${pts ? `<ul class="edu-filler__points">${pts}</ul>` : ''}
    ${ins.proTip ? `<div class="edu-filler__protip"><strong>Pro Tip:</strong> ${esc(ins.proTip)}</div>` : ''}
  </div>`;
    }

    // ── sectionWrap — now wraps in .report-section-wrapper ────────────
    function sectionWrap(num, title, contextText, body) {
      const parts = body.filter(Boolean).join(''); if (!parts) return '';
      const insightKey = SECTION_INSIGHT_MAP[num] || null;
      const fillerHtml = insightKey ? buildFillerHtml(insightKey) : '';
      return `<div class="report-section-wrapper" data-section="${num}">
    <div class="section">
      <div class="sec-header"><div class="sec-num">${num}</div><div class="sec-title">${esc(title)}</div></div>
      ${contextText ? `<div class="sec-context">${esc(contextText)}</div>` : ''}
      ${parts}
    </div>${fillerHtml}
  </div>`;
    }

    // ── A4 height threshold constants ─────────────────────────────────
    const A4_PAGE_HEIGHT_PX = 1123; // 297mm @ 96 dpi
    const FILL_THRESHOLD = 0.60; // 60% → ~175mm

    /**
     * checkSectionNeedsInsight(sectionEl)
     * Returns true when primaryContent height < 60% of A4 page height.
     * @param {HTMLElement} sectionEl — the inner .section div
     * @returns {boolean}
     */
    function checkSectionNeedsInsight(sectionEl) {
      if (!sectionEl) return false;
      return sectionEl.getBoundingClientRect().height < A4_PAGE_HEIGHT_PX * FILL_THRESHOLD;
    }

    // ── Sanitize Strategy ── Remove sensitive backend data before storing in frontend memory
    function sanitizeStrategyForFrontend(strategy) {
      if (!strategy || typeof strategy !== 'object') return strategy;
      // Create shallow copy without sensitive fields
      const { backend_intelligence, step_7_intelligence, ...safeStrategy } = strategy;
      // Keep step_7_intelligence but remove backend_intelligence sub-field if exists
      if (step_7_intelligence && typeof step_7_intelligence === 'object') {
        const { backend_intelligence: bi7, ...safeS7 } = step_7_intelligence;
        safeStrategy.step_7_intelligence = safeS7;
      }
      // Remove any other potentially sensitive fields
      delete safeStrategy._internal;
      delete safeStrategy._raw_prompts;
      delete safeStrategy._api_logs;
      return safeStrategy;
    }

    // ── Load Report ───────────────────────────────────────────────────
    async function loadReport() {
      const params = new URLSearchParams(location.search);
      const id = params.get('id');
      if (!id) { showError('No report ID specified. Please open from the Vault.'); return; }
      
      try {
        const data = await window.APP.api('/api/vault?id=' + encodeURIComponent(id), null, 'GET');
        const report = data.report;
        if (!report) { showError('Report not found.'); return; }
        
        // ── Strategy Normalization (v5 — Production) ──
        const strategy = report.full_report || report.strategy || report.report_data || report;

        // ── Phase 3: Production Canonical Viewer ──
        try {
          const forceFallback = params.get('force_fallback') === 'true';
          if (forceFallback) throw new Error('Forced failure (dev-mode)');

          console.log('[Phase 3] Initiating API-driven viewer render...');
          const viewerData = await window.APP.api('/api/export-pdf?mode=viewer', { strategy: strategy }, 'POST');

          if (viewerData && viewerData.html) {
            console.log('%c[Viewer] Source: API-Canonical', 'color: #22c55e; font-weight: bold');
            
            const container = document.getElementById('report-content');
            container.innerHTML = viewerData.html;
            
            // UI State Sync
            document.getElementById('loading-state').style.display = 'none';
            container.style.display = 'block';
            document.getElementById('btn-export').disabled = false;
            document.getElementById('btn-export2').disabled = false;
            document.getElementById('btn-export-html').disabled = false;
            document.getElementById('btn-export-html2').disabled = false;
            
            // Enable mobile export buttons
            const mobilePdfBtn = document.getElementById('mobile-export-pdf');
            const mobileHtmlBtn = document.getElementById('mobile-export-html');
            if (mobilePdfBtn) mobilePdfBtn.disabled = false;
            if (mobileHtmlBtn) mobileHtmlBtn.disabled = false;
            
            // Store sanitized strategy (remove sensitive backend data)
            window._strategy = sanitizeStrategyForFrontend(strategy);
            return;
          }
          throw new Error('API render returned empty payload');
        } catch (viewerErr) {
          console.warn('%c[Viewer] Source: Legacy-Fallback', 'color: #f59e0b; font-weight: bold', viewerErr.message);
          renderReport(report); // Fallback to client-side JS engine
        }
      } catch (e) {
        showError('Failed to load report: ' + e.message);
      }
    }

    function showError(msg) {
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('error-msg').textContent = msg;
      document.getElementById('error-state').style.display = 'block';
    }

    // ── PDF Export ─────────────────────────────────────────────────────
    // Phase 21F: Backend-only PDF rendering pipeline.
    //
    // The frontend is NOT a PDF renderer. It only:
    //   1. Sends POST /api/export-pdf with { reportId, strategy? }
    //   2. Waits for the backend to return application/pdf
    //   3. Triggers browser download of the blob
    //
    // The backend (export-pdf.js) is the sole rendering authority:
    //   - If reportId is sent → backend hydrates strategy from vault
    //   - If strategy is sent directly → backend uses it
    //   - Backend calls Gotenberg (server-side Chromium) for PDF
    //   - If Gotenberg is not configured → backend returns JSON fallback
    //
    // REMOVED: localhost:3001 Playwright call (dead in production)
    // REMOVED: html2canvas / jsPDF browser rendering (compressed, broken)
    // REMOVED: renderHtmlToPdf function
    //
    // Diagnostic: check response headers in DevTools Network tab:
    //   X-ABE-PDF-Engine   → "gotenberg" | "gotenberg_failed" | "none"
    //   X-ABE-Export-Path  → active path + hydration source
    async function exportPDF() {
      const btn1 = document.getElementById('btn-export');
      const btn2 = document.getElementById('btn-export2');
      if (btn1) { btn1.disabled = true; btn1.textContent = 'Generating…'; }
      if (btn2) { btn2.disabled = true; btn2.textContent = 'Generating PDF — this may take 15–30s…'; }

      try {
        // Auth token — same pattern as auth-guard.js apiFetch()
        const token = window.APP
          ? (await window.APP.token())
          : (sessionStorage.getItem('abe_token') || '');
        if (!token) throw new Error('Session expired. Please sign in again and retry export.');

        // reportId comes from the URL (?id=...) — the same ID loadReport() used.
        // Sending reportId lets the backend hydrate the full strategy from vault,
        // bypassing the "Missing strategy.company_name" failure completely.
        const reportId = new URLSearchParams(location.search).get('id');
        if (!reportId) throw new Error('No report ID in URL. Please open this report from the Vault.');

        // Build POST body: always include reportId; include strategy as a cache hint
        // if it's already in memory (avoids a second vault lookup on the backend).
        const postBody = { reportId };
        if (window._strategy?.company_name) postBody.strategy = window._strategy;

        const exportRes = await fetch('/api/export-pdf', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token,
          },
          body: JSON.stringify(postBody),
        });

        // Log diagnostic headers — visible in DevTools → Network → Response Headers
        console.info(
          '[exportPDF] Engine:', exportRes.headers.get('X-ABE-PDF-Engine') || 'unknown',
          '| Path:', exportRes.headers.get('X-ABE-Export-Path') || 'unknown',
          '| Status:', exportRes.status,
          '| Content-Type:', exportRes.headers.get('Content-Type')
        );

        if (!exportRes.ok) {
          let errMsg = 'Export failed: HTTP ' + exportRes.status;
          try {
            const ct = exportRes.headers.get('Content-Type') || '';
            const errBody = ct.includes('application/json') ? await exportRes.json() : await exportRes.text();
            errMsg = (errBody?.error || errBody?.message) || String(errBody) || errMsg;
          } catch (_) {}
          if (exportRes.status === 401 || exportRes.status === 403) {
            errMsg = 'Session expired. Please sign in again and retry export.';
          }
          throw new Error(errMsg);
        }

        const contentType = exportRes.headers.get('Content-Type') || '';

        // ── Path A: Backend returned a real PDF binary (Gotenberg active) ──
        if (contentType.includes('application/pdf')) {
          console.info('[exportPDF] ✅ PDF received from backend — triggering download');
          const blob = await exportRes.blob();
          const disposition = exportRes.headers.get('Content-Disposition') || '';
          let filename = 'GTM_Report.pdf';
          const fnMatch = disposition.match(/filename="([^"]+)"/);
          if (fnMatch) filename = fnMatch[1];
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          a.remove();
          window.URL.revokeObjectURL(url);
          return;
        }

        // ── Path B: JSON fallback (Gotenberg not configured on this deployment) ──
        // The backend returned HTML that can be saved or printed manually.
        // No client-side rendering — instruct the user to configure Gotenberg.
        const data = await exportRes.json();
        if (data.pdf_fallback === 'gotenberg_failed') {
          console.warn('[exportPDF] Gotenberg failed server-side:', data.pdf_fallback_reason);
        }
        if (data.html) {
          // Offer the HTML as a downloadable file so the user is not left empty-handed
          const blob = new Blob([data.html], { type: 'text/html' });
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = (data.filename || 'GTM_Report').replace(/\.pdf$/, '.html');
          document.body.appendChild(a);
          a.click();
          a.remove();
          window.URL.revokeObjectURL(url);
          alert(
            'PDF rendering is not enabled on this deployment.\n\n' +
            'Your report has been downloaded as an HTML file that you can open in Chrome and use File → Print → Save as PDF.\n\n' +
            'To enable server-side PDF export, set PDF_RENDER_ENGINE=gotenberg and GOTENBERG_URL in your Cloudflare environment variables.'
          );
          return;
        }
        throw new Error(data.error || 'Export failed — no content returned from server.');

      } catch (e) {
        // Do NOT force signOut — transient failures must not log the user out.
        console.error('[exportPDF] Error:', e);
        alert('PDF export failed: ' + e.message);
      } finally {
        if (btn1) { btn1.disabled = false; btn1.textContent = 'Export PDF'; }
        if (btn2) { btn2.disabled = false; btn2.textContent = 'Export PDF'; }
      }
    }

    // ── Export HTML — Download report as standalone HTML file ─────────
    // SECURITY: Only captures rendered DOM content (reportContent.innerHTML).
    // Does NOT include window._strategy or any JavaScript data.
    // Sensitive backend data (backend_intelligence, formulas) is stripped by sanitizeStrategyForFrontend().
    async function exportHTML() {
      const btn1 = document.getElementById('btn-export-html');
      const btn2 = document.getElementById('btn-export-html2');
      if (btn1) { btn1.disabled = true; btn1.textContent = 'Preparing…'; }
      if (btn2) { btn2.disabled = true; btn2.textContent = 'Preparing HTML…'; }

      try {
        // Get current report content (rendered DOM only - no JS data)
        const reportContent = document.getElementById('report-content');
        const companyName = document.getElementById('r-company')?.textContent || 'GTM_Report';
        const filename = companyName.replace(/[^a-z0-9]/gi, '_') + '.html';

        // Get HTML content
        let safeHtml = reportContent.innerHTML;
        
        // Remove action buttons section (ph-actions) - we don't want Vault/Export buttons in exported HTML
        safeHtml = safeHtml.replace(/<div class="ph-actions"[^>]*>[\s\S]*?<\/div>/gi, '');
        
        // Remove data attributes that might contain backend data
        safeHtml = safeHtml.replace(/\sdata-[a-z0-9-]+="[^"]*"/gi, '');
        // Remove any script tags if present
