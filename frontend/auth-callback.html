<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ABE · Signing you in…</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  height:100%;background:#07070A;color:#F4F4F5;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  display:flex;align-items:center;justify-content:center}
.wrap{text-align:center;padding:40px 24px;max-width:380px}
.logo{
  width:52px;height:52px;
  background:linear-gradient(135deg,#7C3AED,#4F46E5);
  border-radius:14px;display:flex;align-items:center;justify-content:center;
  margin:0 auto 24px;font-family:'Courier New',monospace;
  font-size:15px;font-weight:700;color:white}
.spinner{
  width:36px;height:36px;
  border:3px solid rgba(124,58,237,.2);
  border-top-color:#7C3AED;border-radius:50%;
  animation:spin .7s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.title{font-size:18px;font-weight:700;color:white;margin-bottom:8px}
.sub{font-size:13px;color:#71717A;line-height:1.6}
.error-box{
  background:rgba(244,63,94,.08);
  border:1px solid rgba(244,63,94,.25);
  border-radius:10px;padding:14px 18px;
  color:#FDA4AF;font-size:13px;line-height:1.6;
  margin-top:20px;display:none;text-align:left}
.error-box.show{display:block}
.back-btn{
  margin-top:20px;padding:10px 24px;
  background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.3);
  color:#A78BFA;border-radius:8px;cursor:pointer;
  font-size:13px;font-weight:600;font-family:inherit;
  transition:all .15s;display:none}
.back-btn.show{display:inline-block}
.back-btn:hover{background:rgba(124,58,237,.25)}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">ABE</div>
  <div class="spinner" id="spinner"></div>
  <div class="title" id="title">Signing you in…</div>
  <div class="sub"  id="sub">Verifying your session, please wait.</div>
  <div class="error-box" id="err"></div>
  <button class="back-btn" id="back-btn"
    onclick="window.location.replace('/login')">
    Return to Login
  </button>
</div>

<!-- auth-guard provides window.APP and window.authGuard -->
<script src="auth-guard.js"></script>
<script>
(async function () {
  try {
    // Hands off entirely to auth-guard.
    // auth-guard extracts the token from the URL hash,
    // stores it in sessionStorage, validates via /api/session,
    // then redirects to dashboard.
    await window.authGuard.handleOAuthCallback();
  } catch (e) {
    // Show error — never crash silently
    document.getElementById('spinner').style.display  = 'none';
    document.getElementById('title').textContent      = 'Authentication Failed';
    document.getElementById('sub').textContent        = 'Something went wrong signing you in.';

    var errEl = document.getElementById('err');
    errEl.textContent = e.message || 'Unexpected error — please try again.';
    errEl.classList.add('show');
    document.getElementById('back-btn').classList.add('show');
  }
})();
</script>
</body>
</html>
