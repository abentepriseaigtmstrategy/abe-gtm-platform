<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Completing Sign In...</title>
    <style>
        :root {
            --bg-primary: #0D0D0D;
            --bg-secondary: #1A1A1A;
            --accent-cyan: #00F0FF;
            --accent-magenta: #FF00FF;
            --text-primary: #FFFFFF;
            --text-secondary: #B3B3B3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .loader-container {
            text-align: center;
            max-width: 400px;
        }

        .logo {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 2rem;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(0, 240, 255, 0.1);
            border-top-color: var(--accent-cyan);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-text {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .status-detail {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .error-message {
            background: rgba(255, 51, 102, 0.1);
            border: 1px solid #FF3366;
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
            text-align: left;
        }

        .error-title {
            color: #FF3366;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .retry-btn {
            margin-top: 1rem;
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
            color: var(--bg-primary);
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 240, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="logo">ABE GTM Platform</div>
        <div class="spinner"></div>
        <div class="status-text" id="status-text">Completing sign in...</div>
        <div class="status-detail" id="status-detail">Please wait while we authenticate your account</div>
        <div id="error-container" style="display: none;">
            <div class="error-message">
                <div class="error-title">Authentication Error</div>
                <div id="error-message"></div>
            </div>
            <button class="retry-btn" onclick="window.location.href='/login.html'">
                Return to Login
            </button>
        </div>
    </div>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://cwcvneluhlimhlzowabv.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_EeDAvGbX7TpO_hgBoUZMhQ_B_nJtAbb';
        
        // Load Supabase from CDN
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
        script.onload = function() {
            const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            handleOAuthCallback(sb);
        };
        document.head.appendChild(script);

        async function handleOAuthCallback(supabase) {
            const statusText = document.getElementById('status-text');
            const statusDetail = document.getElementById('status-detail');
            const errorContainer = document.getElementById('error-container');
            const errorMessage = document.getElementById('error-message');

            try {
                console.log('🔄 OAuth callback received');
                statusText.textContent = 'Verifying authentication...';

                // Get the session from the URL
                const { data: { session }, error: sessionError } = await supabase.auth.getSession();

                if (sessionError) {
                    throw new Error(`Session error: ${sessionError.message}`);
                }

                if (!session) {
                    throw new Error('No session found after OAuth. Please try signing in again.');
                }

                console.log('✅ OAuth session verified for:', session.user.email);
                statusText.textContent = 'Setting up your account...';
                statusDetail.textContent = `Welcome, ${session.user.email}`;

                // Check if user profile exists
                const { data: profile, error: profileError } = await supabase
                    .from('user_profiles')
                    .select('*, organizations(*)')
                    .eq('id', session.user.id)
                    .single();

                if (profileError && profileError.code !== 'PGRST116') {
                    console.error('Profile fetch error:', profileError);
                }

                // Determine where to redirect
                if (!profile) {
                    console.log('📝 New OAuth user - needs profile creation and onboarding');
                    
                    // New user - create profile first
                    await createUserProfile(supabase, session.user);
                    
                    // Redirect to login with onboarding flag
                    statusText.textContent = 'Creating your account...';
                    setTimeout(() => {
                        window.location.href = '/login.html?show_onboarding=true';
                    }, 1000);
                    
                } else if (!profile.onboarding_completed) {
                    console.log('📋 User exists but onboarding incomplete');
                    
                    // Existing user, incomplete onboarding
                    statusText.textContent = 'Account found, completing setup...';
                    setTimeout(() => {
                        window.location.href = '/login.html?show_onboarding=true';
                    }, 1000);
                    
                } else {
                    console.log('🎉 User fully set up - redirecting to dashboard');
                    
                    // User is fully set up - go to dashboard
                    statusText.textContent = 'Welcome back!';
                    statusDetail.textContent = 'Redirecting to your dashboard...';
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 1000);
                }

            } catch (error) {
                console.error('❌ OAuth callback error:', error);
                
                // Show error
                statusText.textContent = 'Authentication Failed';
                statusDetail.textContent = '';
                errorContainer.style.display = 'block';
                errorMessage.textContent = error.message || 'An unexpected error occurred. Please try signing in again.';
                
                // Hide spinner
                document.querySelector('.spinner').style.display = 'none';
            }
        }

        async function createUserProfile(supabase, user) {
            try {
                // Generate device fingerprint
                const deviceId = generateDeviceFingerprint();

                // Create organization for user
                const { data: org, error: orgError } = await supabase
                    .from('organizations')
                    .insert({
                        name: `${user.email}'s Organization`,
                        plan_tier: 'free_trial',
                        owner_id: user.id
                    })
                    .select()
                    .single();

                if (orgError) {
                    console.error('Organization creation error:', orgError);
                    throw orgError;
                }

                // Create user profile
                const { data: profile, error: profileError } = await supabase
                    .from('user_profiles')
                    .insert({
                        id: user.id,
                        email: user.email,
                        organization_id: org.id,
                        plan: 'free_trial',
                        tc_accepted: true, // Implied by OAuth
                        marketing_consent: false,
                        device_id: deviceId,
                        onboarding_completed: false,
                        auth_provider: 'google',
                        created_at: new Date().toISOString()
                    })
                    .select()
                    .single();

                if (profileError) {
                    console.error('Profile creation error:', profileError);
                    throw profileError;
                }

                // Create organization membership
                await supabase
                    .from('organization_members')
                    .insert({
                        organization_id: org.id,
                        user_id: user.id,
                        role: 'owner'
                    });

                console.log('✅ User profile created successfully');
                return profile;

            } catch (error) {
                console.error('Error creating user profile:', error);
                throw error;
            }
        }

        function generateDeviceFingerprint() {
            const fingerprint = {
                userAgent: navigator.userAgent,
                language: navigator.language,
                platform: navigator.platform,
                screenResolution: `${screen.width}x${screen.height}`,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                colorDepth: screen.colorDepth
            };

            const str = JSON.stringify(fingerprint);
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }

            return `fp_${Math.abs(hash).toString(36)}`;
        }
    </script>
</body>
</html>
