# wrangler.toml
# Cloudflare Pages — project root
# Compatible date must be 2024-09-23+ for ES modules + nodejs_compat_v2

name = "abe-gtm-platform"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

pages_build_output_dir = "frontend"

# KV namespace — binding name MUST match what _middleware.js expects
# Using STRATEGY_CACHE to match the code
[[kv_namespaces]]
binding = "STRATEGY_CACHE"
id      = "61d9ea1ad72b49658b1ab2fac175bbb9"

[vars]
ALLOWED_ORIGIN = "https://abe-gtm-platform-bza.pages.dev"
# ── Aligned with auth-guard.js and _middleware.js — single source of truth ──
SUPABASE_URL      = "https://cwcvneluhlimhlzowabv.supabase.co"
SUPABASE_ANON_KEY = "sb_publishable_EeDAvGbX7TpO_hgBoUZMhQ_B_nJtAbb"

# Secrets — set via CLI, NEVER commit:
#   npx wrangler pages secret put OPENAI_API_KEY        --project-name abe-gtm-platform
#   npx wrangler pages secret put SUPABASE_SERVICE_KEY  --project-name abe-gtm-platform
