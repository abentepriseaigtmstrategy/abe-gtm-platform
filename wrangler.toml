# wrangler.toml
# Cloudflare Pages — project root
# Compatible date must be 2024-09-23+ for ES modules + nodejs_compat_v2

name = "abe-gtm-platform"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

pages_build_output_dir = "frontend"

# KV namespace — binding name MUST match what _middleware.js expects
[[kv_namespaces]]
binding = "STRATEGY_CACHE"
id      = "61d9ea1ad72b49658b1ab2fac175bbb9"

[vars]
# ALLOWED_ORIGIN: set to * so CORS works on any Pages domain (*.pages.dev,
# custom domain, localhost:PORT). The API endpoints are still protected by
# Supabase JWT auth — CORS being open is not a security risk here.
# If you want to lock this down after go-live, set it to your custom domain.
ALLOWED_ORIGIN = "*"

# ── Aligned with auth-guard.js, login.html, and index.html ──────────────────
SUPABASE_URL      = "https://cwcvneluhlimhlzowabv.supabase.co"
# JWT-format anon key (same as auth-guard.js and _middleware.js hardcoded fallback)
SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3Y3ZuZWx1aGxpbWhsem93YWJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MzAxMjAsImV4cCI6MjA4OTIwNjEyMH0.SZDS-svU-kFh_OkUq3AjQY64F-71MpbBsFd6Iin5DlQ"

# Secrets — set via CLI, NEVER commit:
#   npx wrangler pages secret put OPENAI_API_KEY        --project-name abe-gtm-platform
#   npx wrangler pages secret put SUPABASE_SERVICE_KEY  --project-name abe-gtm-platform
